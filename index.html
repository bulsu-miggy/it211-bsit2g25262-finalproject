<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <title>Sparkverse | Login</title>
    <style>
        :root {
            --spark-blue: #00B4D8;
            --spark-yellow: #FFD700;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7f6;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            display: flex;
            background: white;
            width: 900px;
            height: 550px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .left {
            padding: 60px;
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 { color: #333; font-weight: 800; margin: 0 0 10px 0; font-size: 35px; }
        .subtitle { color: #777; margin-bottom: 35px; font-size: 15px; }

        form { display: flex; flex-direction: column; gap: 20px; }

        .input-group {
            position: relative;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 15px;
            padding-right: 50px; /* Space para sa eye icon */
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
            background: #f9f9f9;
        }

        /* --- EYE ICON STYLE --- */
        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            transition: 0.3s;
        }

        .toggle-btn:hover { color: var(--spark-blue); }

        /* --- FORGOT PASSWORD LINK STYLE --- */
        .forgot-link {
            text-align: right;
            margin-top: -10px;
            font-size: 13px;
        }
        .forgot-link a {
            color: #999;
            text-decoration: none;
            transition: 0.3s;
        }
        .forgot-link a:hover { color: var(--spark-blue); }

        button[type="submit"] {
            background: var(--spark-yellow);
            color: #444;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .register-link { margin-top: 30px; text-align: center; font-size: 14px; color: #777; }
        .register-link a { color: var(--spark-blue); text-decoration: none; font-weight: 700; }

        /* RIGHT SIDE: LOGO */
        .right {
            flex: 1;
            background: var(--spark-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .right img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <h1>Welcome back!</h1>
        <p class="subtitle">Please enter your email and password:</p>

        <form action="login.php" method="POST">
            <input type="text" name="email" placeholder="Email Address" required>
            
            <div class="input-group">
                <input type="password" name="password" id="pw" placeholder="Password" required>
                
                <span class="toggle-btn" onclick="var x = document.getElementById('pw'); x.type = (x.type === 'password') ? 'text' : 'password';">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>

            <div class="forgot-link">
                <a href="user_forgot_password.php">Forgot password?</a>
            </div>

            <button type="submit">Login</button>
        </form>

        <p class="register-link">Not a member? <a href="register.php">Register now!</a></p>
    </div>

    <div class="right">
        <img src="character.png" alt="Sparkverse Logo">
    </div>
</div>

</body>
</html>
